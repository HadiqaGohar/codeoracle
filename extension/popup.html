<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #fafafa;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 svg { width: 20px; height: 20px; }
    p {
      font-size: 13px;
      color: #a1a1aa;
      margin: 0 0 12px;
      line-height: 1.5;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      transition: all 0.2s;
    }
    .btn:hover {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
    }
    .features {
      margin: 12px 0;
      font-size: 12px;
      color: #71717a;
    }
    .features li {
      margin: 4px 0;
      list-style: none;
    }
    .features li::before {
      content: "→ ";
      color: #8b5cf6;
    }
  </style>
</head>
<body>
  <h1>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
    CodeOracle
  </h1>
  <p>Analyze any GitHub repository with AI-powered code review.</p>
  <ul class="features">
    <li>Security vulnerability detection</li>
    <li>Code quality scoring</li>
    <li>Architecture analysis</li>
    <li>7+ analysis types</li>
  </ul>
  <a id="analyze-btn" class="btn" href="https://codeoracle-chi.vercel.app" target="_blank">
    Open CodeOracle
  </a>
  <script src="popup.js"></script>
</body>
</html>
